# fly.toml app configuration file generated for my-pantry-app on 2026-03-02T15:48:37-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'my-pantry-app'
primary_region = 'lax'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']
  kill_signal = "SIGINT"
  kill_timeout = "30s"
  [http_service.http_options]
    idle_timeout = 180

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
  